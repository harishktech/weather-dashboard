<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .search-container input {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            width: 300px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            outline: none;
            background: white;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .search-container button {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background: white;
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .weather-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .city-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .date-time {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .weather-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .temperature {
            font-size: 3rem;
            font-weight: 700;
            color: #667eea;
        }

        .weather-icon {
            width: 80px;
            height: 80px;
        }

        .weather-description {
            text-transform: capitalize;
            color: #666;
            font-size: 1.1rem;
            margin: 10px 0;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .detail-item {
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .detail-label {
            color: #999;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .detail-value {
            color: #333;
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 5px;
        }

        .forecast {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .forecast h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-item {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .forecast-item:hover {
            background: #667eea;
            color: white;
        }

        .forecast-day {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .forecast-icon {
            width: 50px;
            height: 50px;
            margin: 10px auto;
        }

        .forecast-temp {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .forecast-description {
            font-size: 0.85rem;
            margin-top: 5px;
            opacity: 0.7;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .favorites {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .favorite-btn {
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .favorite-btn:hover {
            background: white;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .search-container input {
                width: 100%;
            }

            .weather-grid {
                grid-template-columns: 1fr;
            }

            .temperature {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any city</p>
        </div>

        <div class="search-container">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                autocomplete="off"
            >
            <button onclick="searchWeather()">Search</button>
        </div>

        <div id="favorites" class="favorites"></div>

        <div id="errorContainer"></div>
        <div id="loadingContainer"></div>
        <div id="weatherContainer" class="weather-grid"></div>
        <div id="forecastContainer"></div>
    </div>

    <script>
        const API_KEY = 'YOUR_OPENWEATHERMAP_API_KEY';
        const BASE_URL = 'https://api.openweathermap.org/data/2.5';
        
        let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || [];

        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchWeather();
        });

        displayFavorites();

        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) return;

            showLoading(true);
            clearErrors();

            try {
                const weatherData = await fetchWeatherData(city);
                displayWeather(weatherData);
                displayForecast(city);
                addToFavorites(city);
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }

        async function fetchWeatherData(city) {
            const url = `${BASE_URL}/weather?q=${city}&appid=${API_KEY}&units=metric`;
            const response = await fetch(url);

            if (!response.ok) {
                if (response.status === 404) {
                    throw new Error('City not found. Please check the spelling and try again.');
                }
                throw new Error('Failed to fetch weather data');
            }

            return await response.json();
        }

        async function fetchForecastData(city) {
            const url = `${BASE_URL}/forecast?q=${city}&appid=${API_KEY}&units=metric`;
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error('Failed to fetch forecast data');
            }

            return await response.json();
        }

        function displayWeather(data) {
            const weatherContainer = document.getElementById('weatherContainer');
            const now = new Date();
            const dateString = now.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            const card = `
                <div class="weather-card">
                    <div class="city-name">${data.name}, ${data.sys.country}</div>
                    <div class="date-time">${dateString}</div>
                    
                    <div class="weather-main">
                        <div>
                            <div class="temperature">${Math.round(data.main.temp)}°C</div>
                            <div class="weather-description">${data.weather[0].description}</div>
                        </div>
                        <img 
                            src="https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png" 
                            alt="${data.weather[0].main}"
                            class="weather-icon"
                        >
                    </div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">Feels Like</div>
                            <div class="detail-value">${Math.round(data.main.feels_like)}°C</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value">${data.main.humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Pressure</div>
                            <div class="detail-value">${data.main.pressure} hPa</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Wind Speed</div>
                            <div class="detail-value">${data.wind.speed} m/s</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Max Temp</div>
                            <div class="detail-value">${Math.round(data.main.temp_max)}°C</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Min Temp</div>
                            <div class="detail-value">${Math.round(data.main.temp_min)}°C</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Visibility</div>
                            <div class="detail-value">${(data.visibility / 1000).toFixed(1)} km</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Cloud Coverage</div>
                            <div class="detail-value">${data.clouds.all}%</div>
                        </div>
                    </div>
                </div>
            `;

            weatherContainer.innerHTML = card;
        }

        async function displayForecast(city) {
            try {
                const data = await fetchForecastData(city);
                const forecastContainer = document.getElementById('forecastContainer');
                
                const dailyForecasts = {};
                data.list.forEach(item => {
                    const date = new Date(item.dt * 1000);
                    const day = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                    
                    if (!dailyForecasts[day]) {
                        dailyForecasts[day] = item;
                    }
                });

                let forecastHTML = '<div class="forecast"><h2>5-Day Forecast</h2><div class="forecast-grid">';
                
                Object.entries(dailyForecasts).slice(0, 5).forEach(([day, forecast]) => {
                    forecastHTML += `
                        <div class="forecast-item">
                            <div class="forecast-day">${day}</div>
                            <img 
                                src="https://openweathermap.org/img/wn/${forecast.weather[0].icon}@2x.png"
                                alt="${forecast.weather[0].main}"
                                class="forecast-icon"
                            >
                            <div class="forecast-temp">${Math.round(forecast.main.temp)}°C</div>
                            <div class="forecast-description">${forecast.weather[0].main}</div>
                        </div>
                    `;
                });

                forecastHTML += '</div></div>';
                forecastContainer.innerHTML = forecastHTML;
            } catch (error) {
                console.error('Forecast error:', error);
            }
        }

        function addToFavorites(city) {
            if (!favorites.includes(city)) {
                favorites.push(city);
                localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
                displayFavorites();
            }
        }

        function displayFavorites() {
            const favContainer = document.getElementById('favorites');
            if (favorites.length === 0) return;

            let html = '<strong style="color: white; display: block; margin-bottom: 10px;">⭐ Favorites:</strong>';
            favorites.forEach(city => {
                html += `
                    <button 
                        class="favorite-btn"
                        onclick="searchFavorite('${city}')"
                    >
                        ${city}
                    </button>
                `;
            });
            favContainer.innerHTML = html;
        }

        function searchFavorite(city) {
            document.getElementById('cityInput').value = city;
            searchWeather();
        }

        function showLoading(show) {
            const loadingContainer = document.getElementById('loadingContainer');
            if (show) {
                loadingContainer.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        Fetching weather data...
                    </div>
                `;
            } else {
                loadingContainer.innerHTML = '';
            }
        }

        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
        }

        function clearErrors() {
            document.getElementById('errorContainer').innerHTML = '';
        }
    </script>
</body>
</html>
